<!DOCTYPE html>
<html>
<head>
<title>Oil Crisis Monitor</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.card{
background:#1e293b;
padding:20px;
margin:15px;
border-radius:10px;
display:inline-block;
min-width:220px;
}

button{
padding:12px 24px;
font-size:18px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
margin-top:20px;
}

</style>
</head>

<body>

<h1>🌍 Oil Crisis Monitor</h1>

<button onclick="runMonitor()">Run Monitor</button>

<div id="dashboard"></div>

<script>

async function getPrice(symbol){

const url = `https://api.allorigins.win/raw?url=https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbol}`;

const res = await fetch(url);
const data = await res.json();

return data.quoteResponse.result[0].regularMarketPrice;

}

function riskScore(vix, brent){

let score = 0;

if(vix > 25) score += 1;
if(vix > 35) score += 2;

if(brent > 100) score += 1;
if(brent > 120) score += 2;

return score;

}

async function runMonitor(){

document.getElementById("dashboard").innerHTML="Loading...";

const res = await fetch("/api/prices");
const data = await res.json();

const vix = data.vix;
const brent = data.brent;

const hormuzTraffic = 28;
const tankerRate = 120000;

let score = 0;

if(vix>25) score++;
if(vix>35) score+=2;
if(brent>100) score++;
if(brent>120) score+=2;

let status="Normal";
if(score>=4) status="Stress";
if(score>=6) status="Crisis";

document.getElementById("dashboard").innerHTML = `

<div class="card"><h3>VIX</h3>${vix}</div>
<div class="card"><h3>Brent</h3>$${brent}</div>
<div class="card"><h3>Hormuz Traffic</h3>${hormuzTraffic}</div>
<div class="card"><h3>VLCC Rates</h3>$${tankerRate}</div>
<div class="card"><h3>Risk Score</h3>${score}</div>
<div class="card"><h3>Status</h3>${status}</div>

`;

}

}

catch(err){

document.getElementById("dashboard").innerHTML =
"Error loading data. Refresh and try again.";

}

}

</script>

</body>
</html>
