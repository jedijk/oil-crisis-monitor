<!DOCTYPE html>
<html>

<head>

<title>Oil Crisis Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
margin:15px;
border-radius:10px;
display:inline-block;
min-width:220px;
}

button{
background:#22c55e;
border:none;
padding:12px 24px;
font-size:18px;
border-radius:8px;
cursor:pointer;
color:white;
}

canvas{
background:white;
border-radius:10px;
margin-top:30px;
}

iframe{
border-radius:10px;
margin-top:30px;
}

</style>

</head>

<body>

<h1>🌍 Oil Crisis Monitor</h1>

<button onclick="runMonitor()">Run Monitor</button>

<div id="dashboard"></div>

<canvas id="oilChart" width="600" height="300"></canvas>

<h2>Hormuz Tanker Traffic</h2>

<iframe
width="800"
height="450"
src="https://www.marinetraffic.com/en/ais/home/centerx:56.5/centery:26.6/zoom:6"
></iframe>

<script>

let chart;

async function runMonitor(){

const response = await fetch("/api/prices");
const data = await response.json();

const vix = data.vix;
const brent = data.brent;

const hormuzTraffic = 28;
const tankerRate = 120000;

let score = 0;

if(vix>25) score++;
if(vix>35) score+=2;

if(brent>100) score++;
if(brent>120) score+=2;

let status="Normal";

if(score>=4) status="Stress";
if(score>=6) status="Crisis";

document.getElementById("dashboard").innerHTML = `

<div class="card"><h3>VIX</h3>${vix}</div>

<div class="card"><h3>Brent</h3>$${brent}</div>

<div class="card"><h3>Hormuz Traffic</h3>${hormuzTraffic}</div>

<div class="card"><h3>VLCC Rate</h3>$${tankerRate}</div>

<div class="card"><h3>Risk Score</h3>${score}</div>

<div class="card"><h3>Status</h3>${status}</div>

`;

updateChart(brent);

}

function updateChart(price){

const ctx = document.getElementById("oilChart");

if(chart){
chart.data.datasets[0].data.push(price);
chart.update();
return;
}

chart = new Chart(ctx,{
type:"line",
data:{
labels:["Now"],
datasets:[{
label:"Brent Oil",
data:[price],
borderColor:"red",
borderWidth:3
}]
}
});

}

</script>

</body>
</html>
