<!DOCTYPE html>
<html>
<head>

<title>Oil Crisis Monitor</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

h1{
margin-bottom:30px;
}

button{
background:#22c55e;
color:white;
border:none;
padding:12px 24px;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.card{
background:#1e293b;
padding:20px;
margin:10px;
border-radius:10px;
display:inline-block;
min-width:200px;
}

</style>

</head>

<body>

<h1>🌍 Oil Crisis Monitor</h1>

<button onclick="runMonitor()">Run Monitor</button>

<div id="dashboard"></div>

<script>

async function runMonitor(){

document.getElementById("dashboard").innerHTML="Loading...";

try{

const response = await fetch("/api/prices");
const data = await response.json();

const vix = data.vix;
const brent = data.brent;

const hormuzTraffic = 28;
const tankerRate = 120000;

let score = 0;

if(vix > 25) score += 1;
if(vix > 35) score += 2;

if(brent > 100) score += 1;
if(brent > 120) score += 2;

let status = "Normal";

if(score >= 4) status = "Stress";
if(score >= 6) status = "Crisis";

document.getElementById("dashboard").innerHTML = `

<div class="card">
<h3>VIX</h3>
<p>${vix}</p>
</div>

<div class="card">
<h3>Brent</h3>
<p>$${brent}</p>
</div>

<div class="card">
<h3>Hormuz Traffic</h3>
<p>${hormuzTraffic} tankers/day</p>
</div>

<div class="card">
<h3>VLCC Rate</h3>
<p>$${tankerRate}/day</p>
</div>

<div class="card">
<h3>Risk Score</h3>
<p>${score}</p>
</div>

<div class="card">
<h3>Status</h3>
<p>${status}</p>
</div>

`;

}

catch(error){

document.getElementById("dashboard").innerHTML =
"Error loading data. Refresh and try again.";

}

}

</script>

</body>
</html>
